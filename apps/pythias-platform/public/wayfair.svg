<svg viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Wayfair castle/turret mark — 5 peaks -->
  <g fill="#7B2D8B">
    <!-- Turret 1 -->
    <polygon points="10,55 10,25 20,10 30,25 30,55"/>
    <!-- Turret 2 -->
    <polygon points="35,55 35,25 45,10 55,25 55,55"/>
    <!-- Turret 3 -->
    <polygon points="60,55 60,25 70,10 80,25 80,55"/>
    <!-- Turret 4 -->
    <polygon points="85,55 85,25 95,10 105,25 105,55"/>
    <!-- Turret 5 -->
    <polygon points="110,55 110,25 120,10 130,25 130,55"/>
    <!-- Castle body -->
    <rect x="10" y="50" width="120" height="40" rx="2"/>
  </g>
</svg>
